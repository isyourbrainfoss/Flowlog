name: Android Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-pages
  cancel-in-progress: false

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          (cd app/flowlog && flutter pub get)

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses

      - name: Build release APK (arm64 only)
        working-directory: app/flowlog
        run: |
          BUILD=build-${{ github.run_number }}
          flutter build apk --release --split-per-abi --target-platform android-arm64 \
            --build-number=${{ github.run_number }} \
            --build-name="$BUILD"

      - name: Prepare release assets
        run: |
          APK=app/flowlog/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          BUILD=build-${{ github.run_number }}
          cp "$APK" flowlog-release.apk
          cp "$APK" flowlog-arm64-v8a.apk
          echo "VERSION=$BUILD" >> "$GITHUB_ENV"
          echo "VERSION_CODE=${{ github.run_number }}" >> "$GITHUB_ENV"
          ls -lh flowlog-*.apk

      # Version code is set directly from the --build-number passed to flutter build above.
      # This avoids fragile aapt parsing, extra apt installs, and potential mismatches.

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            Automated Android build for commit ${{ github.sha }}.

            **Obtainium (recommended):** Direct APK Link → Standard JSON:
            ```
            https://raw.githubusercontent.com/isyourbrainfoss/Flowlog/gh-pages/version.json
            ```

            **Linux Flatpak:** see the [README Linux section](https://github.com/${{ github.repository }}#linux-flatpak)
            or wait for the Flatpak workflow to attach `.flatpak` bundles to this release.
          files: |
            flowlog-release.apk
            flowlog-arm64-v8a.apk
          draft: false
          prerelease: false

      - name: Prepare Obtainium mirror (GitHub Pages branch)
        run: bash tool/prepare_pages_site.sh flowlog-arm64-v8a.apk "$VERSION" "$VERSION_CODE" site

      - name: Deploy APK mirror to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          publish_branch: gh-pages
          keep_files: true
          enable_jekyll: false